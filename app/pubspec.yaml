name: onamiz
description: "Homiladorlar va chaqaloqlar uchun xavfni erta aniqlovchi AI ilova."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP
  dio: ^5.4.0

  # Local storage
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.2.0

  # UI
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Date/Time
  intl: ^0.19.0

  # Icons
  iconsax_flutter: ^1.0.0

  # Fonts
  google_fonts: ^6.1.0

  # Splash
  flutter_native_splash: ^2.4.1

  # Audio recording (cry analyzer)
  record: ^6.0.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#7B3FB0"
  color_dark: "#7B3FB0"
  image: assets/images/logo.png
  android: true
  ios: true
  fullscreen: true
  android_gravity: center
  ios_content_mode: center

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/
